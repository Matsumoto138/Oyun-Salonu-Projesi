<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="main-container">
        <div class="login-container">
            <h1> <img src="./assets/joystick.png" style="width: 30px; height: 30px;"> <span style="color: #00a8ff;">Yazılım</span> <span style="color: orange;">Kids</span> <span style="color: green;">Oyun</span> <span style="color: purple;">Salonu</span> </h1>
            <div class="avatar-selection-area">
                <h4>Avatar Seçimi</h4>
                <div class="avatar-selection">
                    <div class="avatar">
                        <img src="./assets/avatar1.avif" alt="Avatar 1">
                        <p class="avatar-name">Robot</p>
                    </div>
                    <div class="avatar">
                        <img src="./assets/avatar2.avif" alt="Avatar 2">
                        <p class="avatar-name">Astronot</p>
                    </div>
                    <div class="avatar">
                        <img src="./assets/avatar3.avif" alt="Avatar 3">
                        <p class="avatar-name">Uzaylı</p>
                    </div>
                    <div class="avatar">
                        <img src="./assets/avatar4.avif" alt="Avatar 4">
                        <p class="avatar-name">Ninja</p>
                    </div>
                </div>
            </div>
            <div class="login-input-area">
                <input type="text" placeholder="Kahramanın Adı">
                <input type="password" placeholder="Şifre">
                <select name="" id="">
                    <option value="">Kahraman Seçin</option>
                    <option value="">Süperman</option>
                    <option value="">Batman</option>
                    <option value="">Hulk</option>   
                </select>
                <a href="./src/pages/dashboard.html" class="login-btn"><button>Oyuna Başla</button></a>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
